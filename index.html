<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Battle Royale - Chicken Dinner!</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐔</text></svg>">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Segoe UI',Arial,sans-serif; }
  #gameCanvas { display:block; width:100%; height:100%; }
  #scoreDisplay, #submitBtn, #shareCard { display:none; }

  /* Name modal */
  #nameModal {
    position:fixed; inset:0; background:rgba(0,0,0,.85);
    display:flex; align-items:center; justify-content:center; z-index:100;
  }
  #nameModal.hidden { display:none; }
  .modal-box {
    background:linear-gradient(135deg,#1a1a2e,#16213e);
    border:2px solid #e94560; border-radius:16px;
    padding:40px 50px; text-align:center; color:#fff;
    box-shadow:0 0 40px rgba(233,69,96,.4);
  }
  .modal-box h1 { font-size:28px; margin-bottom:8px; color:#e94560; }
  .modal-box p { font-size:14px; color:#aaa; margin-bottom:24px; }
  .modal-box input {
    background:#0f3460; border:1px solid #533483; border-radius:8px;
    color:#fff; padding:12px 20px; font-size:16px; width:260px;
    text-align:center; outline:none;
  }
  .modal-box input:focus { border-color:#e94560; }
  .modal-box button {
    display:block; margin:20px auto 0; background:#e94560;
    color:#fff; border:none; border-radius:8px; padding:14px 40px;
    font-size:18px; cursor:pointer; font-weight:bold;
    transition:background .2s;
  }
  .modal-box button:hover { background:#c73652; }

  /* HUD overlay */
  #hud {
    position:fixed; top:0; left:0; right:0; pointer-events:none;
    display:none; z-index:50;
  }
  #hud.active { display:block; }
  .hud-top {
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:12px 20px;
  }
  .hud-info {
    background:rgba(0,0,0,.6); border-radius:10px; padding:10px 16px;
    color:#fff; font-size:14px;
  }
  .hud-info .alive { color:#e94560; font-weight:bold; font-size:18px; }
  .hud-info .zone { color:#4fc3f7; font-size:12px; }

  /* Health bar */
  #healthBar {
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    width:300px; pointer-events:none; z-index:50; display:none;
  }
  #healthBar.active { display:block; }
  .bar-container {
    background:rgba(0,0,0,.7); border-radius:10px; padding:6px;
    margin-bottom:6px;
  }
  .bar-label { color:#fff; font-size:11px; margin-bottom:2px; }
  .bar-bg {
    background:#333; border-radius:6px; height:14px; overflow:hidden;
  }
  .bar-fill { height:100%; border-radius:6px; transition:width .3s; }
  .bar-fill.health { background:linear-gradient(90deg,#e94560,#ff6b6b); }
  .bar-fill.shield { background:linear-gradient(90deg,#4fc3f7,#81d4fa); }

  /* Weapon HUD */
  #weaponHud {
    position:fixed; bottom:80px; right:20px; pointer-events:none;
    z-index:50; display:none; text-align:right;
  }
  #weaponHud.active { display:block; }
  #weaponHud .weapon-name {
    color:#fff; font-size:16px; font-weight:bold;
    background:rgba(0,0,0,.6); border-radius:8px; padding:8px 14px;
  }
  #weaponHud .ammo { color:#aaa; font-size:13px; }

  /* Inventory */
  #inventoryHud {
    position:fixed; bottom:20px; left:20px; pointer-events:none;
    z-index:50; display:none;
  }
  #inventoryHud.active { display:block; }
  .inv-item {
    background:rgba(0,0,0,.6); border-radius:8px; padding:6px 10px;
    color:#fff; font-size:12px; margin-bottom:4px;
  }

  /* Minimap */
  #minimap {
    position:fixed; top:12px; right:12px; pointer-events:none;
    z-index:50; display:none; border:2px solid rgba(255,255,255,.3);
    border-radius:8px;
  }
  #minimap.active { display:block; }

  /* Game over */
  #gameOverModal {
    position:fixed; inset:0; background:rgba(0,0,0,.85);
    display:none; align-items:center; justify-content:center; z-index:100;
  }
  #gameOverModal.active { display:flex; }
  .go-box {
    background:linear-gradient(135deg,#1a1a2e,#16213e);
    border:2px solid #e94560; border-radius:16px;
    padding:40px 50px; text-align:center; color:#fff;
    box-shadow:0 0 40px rgba(233,69,96,.4);
  }
  .go-box h1 { font-size:32px; margin-bottom:10px; }
  .go-box .win { color:#ffd700; }
  .go-box .lose { color:#e94560; }
  .go-box .stats { font-size:14px; color:#aaa; margin:16px 0; }
  .go-box .btn-row { display:flex; gap:12px; justify-content:center; margin-top:20px; }
  .go-box .btn {
    padding:12px 28px; border:none; border-radius:8px;
    font-size:15px; cursor:pointer; font-weight:bold; color:#fff;
    transition:background .2s;
  }
  .btn-primary { background:#e94560; }
  .btn-primary:hover { background:#c73652; }
  .btn-secondary { background:#533483; }
  .btn-secondary:hover { background:#3d2760; }

  /* Pickup notification */
  #pickupNotif {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    color:#ffd700; font-size:20px; font-weight:bold; pointer-events:none;
    z-index:55; text-shadow:0 0 10px rgba(255,215,0,.6);
    opacity:0; transition:opacity .3s;
  }

  /* Kill feed */
  #killFeed {
    position:fixed; top:80px; right:20px; pointer-events:none; z-index:50;
    max-width:250px;
  }
  .kf-entry {
    background:rgba(0,0,0,.6); border-radius:6px; padding:6px 10px;
    color:#fff; font-size:12px; margin-bottom:4px;
    animation:fadeIn .3s ease-out;
  }
  @keyframes fadeIn { from {opacity:0;transform:translateX(20px)} to {opacity:1;transform:translateX(0)} }
  @keyframes fadeOut { from {opacity:1} to {opacity:0} }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<!-- Name modal -->
<div id="nameModal">
  <div class="modal-box">
    <h1>🐔 Battle Royale</h1>
    <p>Jump from the plane. Loot up. Be the last one standing!</p>
    <input type="text" id="playerNameInput" placeholder="Enter your name" maxlength="16" value="Player">
    <button id="startGameBtn">Start Game</button>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-top">
    <div class="hud-info">
      <div class="alive">Alive: <span id="aliveCount">30</span></div>
      <div class="zone" id="zoneInfo"></div>
    </div>
  </div>
</div>

<canvas id="minimap" width="150" height="150"></canvas>

<div id="healthBar">
  <div class="bar-container">
    <div class="bar-label">Health</div>
    <div class="bar-bg"><div class="bar-fill health" id="healthFill" style="width:100%"></div></div>
  </div>
  <div class="bar-container">
    <div class="bar-label">Shield</div>
    <div class="bar-bg"><div class="bar-fill shield" id="shieldFill" style="width:0%"></div></div>
  </div>
</div>

<div id="weaponHud">
  <div class="weapon-name" id="weaponName">Fists</div>
  <div class="ammo" id="ammoCount"></div>
</div>

<div id="inventoryHud"></div>

<div id="pickupNotif"></div>
<div id="killFeed"></div>

<!-- Game Over -->
<div id="gameOverModal">
  <div class="go-box">
    <h1 id="goTitle"></h1>
    <div class="stats" id="goStats"></div>
    <div class="btn-row">
      <button class="btn btn-primary" id="restartBtn">Play Again</button>
      <button class="btn btn-secondary" id="shareBtn">Share Score</button>
      <button class="btn btn-secondary" id="leaderboardBtn">Leaderboard</button>
    </div>
  </div>
</div>

<!-- Custom elements for scoring/sharing -->
<score-display id="scoreDisplay" style="--score-color:#ffd700;--score-font-size:20px"></score-display>
<submit-button id="submitBtn" style="--button-color:#e94560"></submit-button>
<share-card id="shareCard"></share-card>

<script type="module" src="game.js"></script>
</body>
</html>
